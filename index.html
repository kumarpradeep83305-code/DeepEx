<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NEON MART • user</title>
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* Light theme variables */
        body.light-theme {
            --bg-color: #f0f2f8;
            --bg-gradient: linear-gradient(145deg, #e0e5f0, #f5f7ff);
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-primary: #1a1f2e;
            --text-secondary: #2d3748;
            --border-glow: rgba(0, 200, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.7);
            --input-border: #aaccff;
            --shadow: 0 20px 40px rgba(0, 10, 30, 0.2);
            --neon-text: #0066cc;
            --grid-overlay: rgba(0, 100, 255, 0.05);
        }

        /* Dark theme (default) */
        body {
            --bg-color: #0B0B12;
            --bg-gradient: radial-gradient(circle at 20% 30%, rgba(100, 0, 255, 0.05) 0%, transparent 30%),
                           linear-gradient(rgba(0,255,200,0.02) 1px, transparent 1px),
                           linear-gradient(90deg, rgba(0,255,200,0.02) 1px, transparent 1px);
            --card-bg: rgba(18, 20, 30, 0.7);
            --text-primary: #f0f0ff;
            --text-secondary: #b0c4de;
            --border-glow: rgba(0, 255, 255, 0.6);
            --input-bg: rgba(10, 10, 18, 0.7);
            --input-border: rgba(0, 230, 255, 0.3);
            --shadow: 0 12px 40px rgba(0,0,0,0.7);
            --neon-text: #a0f0ff;
            --grid-overlay: rgba(0, 255, 255, 0.02);
            min-height: 100vh;
            background: var(--bg-color);
            background-image: var(--bg-gradient);
            background-size: 40px 40px, 40px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.2s;
            padding: 16px;
        }

        /* Theme toggle button - BOTTOM RIGHT */
        .theme-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 3000;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--border-glow);
            transition: 0.2s;
            color: var(--neon-text);
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px cyan;
        }

        /* Glass bar (header) */
        .glass-bar {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 12px 22px;
            width: 100%;
            max-width: 700px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            transition: background 0.3s;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-img {
            width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(45deg, cyan, violet);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .brand-name {
            font-size: 20px; font-weight: 600; background: linear-gradient(135deg, #aaf0ff, #f0b0ff); -webkit-background-clip: text; background-clip: text; color: transparent;
        }
        .menu-icon {
            font-size: 28px; cursor: pointer; filter: drop-shadow(0 0 8px cyan); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; background: rgba(0,255,255,0.1); border: 1px solid cyan;
        }

        /* Slide menu */
        .slide-menu {
            position: fixed; top: 0; left: -280px; width: 260px; height: 100vh; background: var(--card-bg); backdrop-filter: blur(20px); z-index: 2000;
            border-right: 2px solid #00ffee; transition: left 0.3s ease; padding: 30px 16px; box-shadow: 10px 0 40px black;
        }
        .slide-menu.open { left: 0; }
        .menu-item { padding: 16px; border-bottom: 1px solid #335577; color: var(--text-primary); font-weight: 500; cursor: pointer; }
        .menu-item:hover { background: #1e3347; box-shadow: -4px 0 0 cyan; }

        /* Search bar */
        .search-bar {
            width: 100%; max-width: 700px; margin-bottom: 28px; position: relative;
        }
        .search-bar input {
            width: 100%; padding: 18px 24px; border-radius: 60px; border: 1px solid var(--border-glow); background: var(--input-bg);
            backdrop-filter: blur(8px); color: var(--text-primary); font-size: 18px; outline: none; box-shadow: 0 0 14px var(--border-glow); transition: 0.3s;
        }
        .search-bar input:focus { box-shadow: 0 0 40px #b77eff; transform: scale(1.02); }

        /* Content card */
        .content-card {
            background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 32px; border: 1px solid var(--border-glow);
            padding: 24px; width: 100%; max-width: 700px; margin-bottom: 24px;
            box-shadow: var(--shadow);
        }

        /* Product grid */
        .product-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 18px; width: 100%; max-width: 700px;
        }
        .product-card {
            background: rgba(20, 20, 35, 0.6); backdrop-filter: blur(6px); border-radius: 24px; padding: 14px; border: 1px solid #5f9eff;
            transition: 0.2s; cursor: pointer;
        }
        body.light-theme .product-card {
            background: rgba(240, 240, 255, 0.6);
        }
        .product-card:hover { transform: translateY(-6px); box-shadow: 0 0 34px #b300ff; border-color: magenta; }
        .product-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 18px; margin-bottom: 10px; }
        .price-big { font-size: 26px; font-weight: 800; background: linear-gradient(135deg,#ffb347,#ff7e5f); -webkit-background-clip:text; background-clip:text; color:transparent; }

        /* Buttons */
        .glow-button {
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border-glow); border-radius: 40px; padding: 12px 30px; color: var(--neon-text); font-weight: bold;
            backdrop-filter: blur(6px); box-shadow: 0 0 14px var(--border-glow); transition: 0.2s; margin: 5px; cursor: pointer;
        }
        body.light-theme .glow-button {
            background: rgba(255,255,255,0.7);
            color: #0066cc;
        }
        .glow-button:active { transform: scale(0.97); }

        /* Modal */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 2000;
        }
        .modal-card {
            max-width: 400px; width: 90%; background: var(--card-bg); border-radius: 32px; padding: 24px; border: 2px solid var(--border-glow);
            box-shadow: var(--shadow);
        }

        /* Input field (for login) */
        .input-field {
            width: 100%;
            padding: 16px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 30px;
            font-size: 16px;
            color: var(--text-primary);
            outline: none;
            transition: 0.2s;
            box-shadow: 0 0 8px var(--border-glow);
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
        }
        .input-field:focus {
            border-color: #a57cff;
            box-shadow: 0 0 24px #6e4aff, 0 0 0 2px rgba(165, 124, 255, 0.5);
        }

        /* Bottom accordion */
        .bottom-accordion {
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 32px;
        }
        .term-chip {
            background: var(--card-bg); border: 1px solid #ff90e0; border-radius: 40px; padding: 12px 20px; color: var(--text-primary); cursor: pointer; backdrop-filter: blur(4px);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Theme toggle button - BOTTOM RIGHT -->
    <div class="theme-toggle" id="themeToggle">🌙</div>

    <div class="glass-bar">
        <div class="logo-area" id="headerLogo">
            <span class="brand-img" id="headerBrandImg">🛍️</span>
            <span class="brand-name" id="headerBrandName">GLOWMART</span>
        </div>
        <div class="menu-icon" id="hamburger">☯</div>
    </div>

    <!-- slide menu -->
    <div id="slideMenu" class="slide-menu">
        <div style="text-align: right; font-size: 28px; margin-bottom: 20px; cursor:pointer;" id="closeMenu">✕</div>
        <div id="menuItems"></div>
    </div>

    <!-- search -->
    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 search products...">
    </div>

    <!-- main content area -->
    <div id="dynamicContent" class="content-card">
        <!-- product grid will be injected here -->
    </div>

    <!-- bottom terms accordion (Socials removed) -->
    <div class="bottom-accordion" id="termsAccordion"></div>

    <script type="module">
        // ========== PASTE YOUR FIREBASE CONFIG HERE ==========
       const firebaseConfig = {
  apiKey: "AIzaSyCkuT1IH0yFHhoX0HsBRrzwnRNYOa-JGtg",
  authDomain: "flipkart-10563.firebaseapp.com",
  databaseURL: "https://flipkart-10563-default-rtdb.firebaseio.com",
  projectId: "flipkart-10563",
  storageBucket: "flipkart-10563.firebasestorage.app",
  messagingSenderId: "693985729203",
  appId: "1:693985729203:web:6ebd3fae23f85f19002ec6"
};
        // ========== END FIREBASE CONFIG SECTION ==========

        import { initializeApp } from 'firebase/app';
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'firebase/auth';
        import { getDatabase, ref, onValue, push, set, get, remove } from 'firebase/database';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-theme');
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.textContent = isLight ? '☀️' : '🌙';
        });

        // DOM
        const headerBrandImg = document.getElementById('headerBrandImg');
        const headerBrandName = document.getElementById('headerBrandName');
        const hamburger = document.getElementById('hamburger');
        const slideMenu = document.getElementById('slideMenu');
        const closeMenu = document.getElementById('closeMenu');
        const menuItemsDiv = document.getElementById('menuItems');
        const dynamicContent = document.getElementById('dynamicContent');
        const searchInput = document.getElementById('searchInput');
        const termsAccordion = document.getElementById('termsAccordion');

        // state
        let currentUser = null;
        let allProducts = [];
        let filteredProducts = [];
        let currentView = 'products';

        // menu open/close
        hamburger.addEventListener('click', () => slideMenu.classList.add('open'));
        closeMenu.addEventListener('click', () => slideMenu.classList.remove('open'));

        // load brand
        function loadBrand() {
            onValue(ref(db, 'meta/brand'), (snap) => {
                if (snap.exists()) {
                    const b = snap.val();
                    headerBrandName.innerText = b.name || 'GLOWMART';
                    if (b.logoUrl) headerBrandImg.innerHTML = `<img src="${b.logoUrl}" style="width:44px; height:44px; border-radius:50%; object-fit:cover;">`;
                }
            });
        }
        loadBrand();

        // load contact for later (without social)
        let contactData = {};
        onValue(ref(db, 'meta/contact'), (snap) => { if (snap.exists()) contactData = snap.val(); });

        // Build menu based on auth
        function buildMenu() {
            let items = [];
            if (currentUser) {
                items.push({ label: `👤 ${currentUser.email}`, action: '' });
                items.push({ label: '📦 Products', view: 'products' });
                items.push({ label: '⭐ Bookmarks', view: 'bookmarks' });
                items.push({ label: '📜 Purchase history', view: 'purchaseHistory' });
                items.push({ label: '📞 Contact Us', view: 'contact' });
                items.push({ label: '🚪 Logout', action: 'logout' });
            } else {
                items.push({ label: '📦 Products', view: 'products' });
                items.push({ label: '⭐ Bookmarks (login)', view: 'loginPrompt' });
                items.push({ label: '📞 Contact Us', view: 'contact' });
                items.push({ label: '🔐 Login / Signup', view: 'login' });
            }
            menuItemsDiv.innerHTML = items.map(i => `<div class="menu-item" data-view="${i.view || ''}" data-action="${i.action || ''}">${i.label}</div>`).join('');
            document.querySelectorAll('.menu-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    const view = e.target.dataset.view;
                    const action = e.target.dataset.action;
                    if (action === 'logout') { signOut(auth); slideMenu.classList.remove('open'); }
                    else if (view) { setView(view); slideMenu.classList.remove('open'); }
                });
            });
        }

        function setView(view) {
            currentView = view;
            if (view === 'products') renderProductGrid(allProducts);
            else if (view === 'bookmarks') renderBookmarks();
            else if (view === 'purchaseHistory') renderPurchaseHistory();
            else if (view === 'contact') renderContact();
            else if (view === 'login') renderLogin();
            else if (view === 'loginPrompt') { alert('Please login first'); setView('login'); }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            buildMenu();
            loadAllProducts();
        });

        // Load products realtime
        function loadAllProducts() {
            onValue(ref(db, 'products'), (snap) => {
                allProducts = [];
                if (snap.exists()) {
                    snap.forEach(child => { allProducts.push({ id: child.key, ...child.val() }); });
                }
                applySearch();
            });
        }

        function applySearch() {
            const term = searchInput.value.toLowerCase();
            filteredProducts = allProducts.filter(p => p.title?.toLowerCase().includes(term));
            if (currentView === 'products') renderProductGrid(filteredProducts);
        }
        searchInput.addEventListener('input', applySearch);

        // render products
        function renderProductGrid(products) {
            let html = '<div class="product-grid">';
            products.forEach(p => {
                html += `<div class="product-card" data-id="${p.id}">
                    <img src="${p.imageUrl || 'https://via.placeholder.com/150'}" loading="lazy">
                    <div style="font-weight:600;">${p.title || ''}</div>
                    <div class="price-big">₹${p.discountedPrice || '0'}</div>
                    <div style="display:flex; gap:6px; margin-top:8px;">
                        <button class="glow-button view-detail" data-id="${p.id}" style="padding:8px; flex:1;">VIEW</button>
                    </div>
                </div>`;
            });
            html += '</div>';
            dynamicContent.innerHTML = html;
            document.querySelectorAll('.view-detail').forEach(btn => btn.addEventListener('click', (e) => {
                const pid = e.target.dataset.id;
                showDetailModal(pid);
            }));
        }

        // detail modal
        function showDetailModal(productId) {
            const prod = allProducts.find(p => p.id === productId);
            if (!prod) return;
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h2 style="margin-bottom:12px;">${prod.title}</h2>
                    <img src="${prod.imageUrl}" style="width:100%; border-radius:24px; margin-bottom:12px;">
                    <p>${prod.description}</p>
                    <div style="font-size:28px; font-weight:800;">₹${prod.discountedPrice} <span style="font-size:16px; text-decoration:line-through;">₹${prod.realPrice}</span></div>
                    <div style="display:flex; gap:10px; margin-top:24px;">
                        <button class="glow-button" id="buyNowBtn">💰 BUY NOW</button>
                        <button class="glow-button" id="bookmarkBtn">🔖 BOOKMARK</button>
                        <button class="glow-button" id="closeModal">✕</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#closeModal').addEventListener('click', () => modal.remove());
            modal.querySelector('#buyNowBtn').addEventListener('click', () => { modal.remove(); showBuyForm(prod); });
            modal.querySelector('#bookmarkBtn').addEventListener('click', () => {
                if (!currentUser) { alert('login required'); modal.remove(); setView('login'); return; }
                set(ref(db, `users/${currentUser.uid}/bookmarks/${prod.id}`), true).then(() => alert('bookmarked'));
            });
        }

        function showBuyForm(prod) {
            if (!currentUser) { alert('please login to buy'); setView('login'); return; }
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-card">
                    <h3>buy: ${prod.title}</h3>
                    <input id="buyName" class="input-field" placeholder="Full name" style="width:100%; margin:8px 0;">
                    <input id="buyEmail" class="input-field" placeholder="Email" value="${currentUser.email || ''}" style="width:100%; margin:8px 0;">
                    <input id="buyPhone" class="input-field" placeholder="Phone" style="width:100%; margin:8px 0;">
                    <button class="glow-button" id="submitBuy">💳 PROCEED TO PAY</button>
                    <button class="glow-button" id="cancelBuy">CANCEL</button>
                </div>
            `;
            document.body.appendChild(modal);
            modal.querySelector('#submitBuy').addEventListener('click', () => {
                const name = modal.querySelector('#buyName').value;
                const email = modal.querySelector('#buyEmail').value;
                const phone = modal.querySelector('#buyPhone').value;
                if (!name || !email) { alert('fill fields'); return; }
                const orderRef = push(ref(db, 'orders'));
                const order = {
                    productId: prod.id,
                    productSnapshot: { title: prod.title, discountedPrice: prod.discountedPrice },
                    userInput: { name, email, phone, uid: currentUser.uid },
                    createdAt: Date.now()
                };
                set(orderRef, order).then(() => {
                    set(ref(db, `users/${currentUser.uid}/purchases/${orderRef.key}`), true);
                    window.location.href = prod.razorpayLink || 'https://razorpay.com';
                });
            });
            modal.querySelector('#cancelBuy').addEventListener('click', () => modal.remove());
        }

        // Bookmarks
        async function renderBookmarks() {
            if (!currentUser) { setView('login'); return; }
            const snap = await get(ref(db, `users/${currentUser.uid}/bookmarks`));
            const ids = snap.exists() ? Object.keys(snap.val()) : [];
            const bookmarked = allProducts.filter(p => ids.includes(p.id));
            renderProductGrid(bookmarked);
        }

        // Purchase history
        async function renderPurchaseHistory() {
            if (!currentUser) return;
            const snap = await get(ref(db, `users/${currentUser.uid}/purchases`));
            const orderIds = snap.exists() ? Object.keys(snap.val()) : [];
            let html = '<div>';
            for (let id of orderIds) {
                const orderSnap = await get(ref(db, `orders/${id}`));
                if (orderSnap.exists()) {
                    const o = orderSnap.val();
                    html += `<div class="glass-card" style="margin:8px; padding:12px;">✅ ${o.productSnapshot?.title} — ₹${o.productSnapshot?.discountedPrice}<br><small>${new Date(o.createdAt).toLocaleString()}</small></div>`;
                }
            }
            html += '</div>';
            dynamicContent.innerHTML = html;
        }

        // Contact (social buttons removed)
        function renderContact() {
            dynamicContent.innerHTML = `
                <div style="text-align:center;">
                    <h2>${contactData.brandName || 'BRAND'}</h2>
                    <p>📌 ${contactData.operator || ''}<br>📍 ${contactData.cityStatePin || ''}<br>📧 ${contactData.email || ''}<br>📞 ${contactData.phone || ''}<br>🏠 ${contactData.address || ''}</p>
                </div>
            `;
        }

        // PREMIUM LOGIN PAGE
        function renderLogin() {
            dynamicContent.innerHTML = `
                <div class="glass-card" style="max-width: 420px; margin: 0 auto; padding: 32px;">
                    <h2 style="text-align: center; font-size: 2rem;">🔐 WELCOME</h2>
                    <p style="text-align: center; margin-bottom: 24px; opacity:0.8;">sign in to your account</p>
                    <input id="loginEmail" class="input-field" placeholder="Email" type="email">
                    <input id="loginPass" type="password" class="input-field" placeholder="Password">
                    <button class="glow-button" id="loginBtn" style="width:100%;">⚡ LOGIN</button>
                    <div style="height: 16px;"></div>
                    <button class="glow-button" id="signupBtn" style="width:100%;">✨ CREATE ACCOUNT</button>
                    <div style="text-align: center; margin-top: 20px; font-size: 14px;">demo: test@test.com / 123456</div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPass').value;
                signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            });
            document.getElementById('signupBtn').addEventListener('click', () => {
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPass').value;
                createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
            });
        }

        // terms accordion (Socials removed)
        const termsData = {
            'Refund Policy': 'Full refund within 7 days of purchase.',
            'T&C': 'Terms and conditions apply. All sales subject to taxes.',
            'Delivery': 'Delivery within 5-7 business days.',
            'Privacy': 'We respect your privacy. No data sharing.',
            'Contact': 'Email: support@glow.com'
        };
        termsAccordion.innerHTML = Object.keys(termsData).map(key => `<div class="term-chip" data-term="${key}">${key}</div>`).join('');
        termsAccordion.querySelectorAll('.term-chip').forEach(el => {
            el.addEventListener('click', () => {
                alert(termsData[el.dataset.term]);
            });
        });

        // fallback initial load
        loadAllProducts();
    </script>
</body>
</html>
